<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula's Achievements</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --text-primary: #e0e0e0;
            --text-secondary: #9090a0;
            --accent: #6b5ce7;
            --accent-hover: #7d6ff0;
            --border: #2a2a35;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 2rem;
            text-align: center;
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        .admin-link {
            position: absolute;
            top: 1.5rem;
            right: 2rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }
        
        .admin-link:hover {
            color: var(--accent);
        }
        
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }
        
        .category {
            margin-bottom: 4rem;
        }
        
        .category-title {
            font-size: 1.5rem;
            font-weight: 400;
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .count {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            border: 1px solid var(--border);
        }
        
        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }
        
        .achievement-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            transition: transform 0.2s, border-color 0.2s;
        }
        
        .achievement-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
        }
        
        .achievement-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        
        .challenge-name {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-primary);
            line-height: 1.4;
        }
        
        .tier-badge, .star-badge {
            background: var(--accent);
            color: white;
            padding: 0.35rem 0.75rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
        }
        
        .star-badge {
            background: #f0a500;
            color: #1a1a1a;
        }
        
        .achievement-meta {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        
        .campaign {
            display: inline-block;
            background: var(--bg-tertiary);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            margin-top: 0.5rem;
            font-size: 0.85rem;
        }
        
        .video-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        
        .video-link:hover {
            color: var(--accent-hover);
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px dashed var(--border);
        }
        
        @media (max-width: 768px) {
            .achievements-grid {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.75rem;
            }
            
            .admin-link {
                position: static;
                display: block;
                margin-top: 1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Nebula's Achievements</h1>
        <div class="subtitle">Gaming Milestones & Records</div>
        <a href="/admin" class="admin-link">Admin</a>
    </header>
    
    <main id="content">
        <!-- Content loaded dynamically -->
    </main>

    <script>
        // REPLACE THIS WITH YOUR NETLIFY SITE URL AFTER DEPLOYMENT
        // Format: https://your-site-name.netlify.app
        const API_URL = '/api/achievements';
        
        async function loadAchievements() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                renderAchievements(data);
            } catch (error) {
                document.getElementById('content').innerHTML = 
                    '<div class="empty-state">Failed to load achievements</div>';
            }
        }
        
        function renderAchievements(data) {
            const container = document.getElementById('content');
            
            const categories = [
                { key: 'celeste_goldens', title: 'Celeste Goldens' },
                { key: 'celeste_clears', title: 'Celeste Clears' },
                { key: 'demons', title: 'Demons' },
                { key: 'gd_platformer', title: 'Platformer Levels (GD)' }
            ];
            
            let html = '';
            
            categories.forEach(cat => {
                const items = data[cat.key] || [];
                html += `
                    <section class="category">
                        <h2 class="category-title">
                            ${cat.title}
                            <span class="count">${items.length}</span>
                        </h2>
                        ${items.length === 0 ? 
                            '<div class="empty-state">No achievements yet</div>' :
                            `<div class="achievements-grid">
                                ${items.map(item => renderCard(item, cat.key)).join('')}
                            </div>`
                        }
                    </section>
                `;
            });
            
            container.innerHTML = html;
        }
        
        function renderCard(item, category) {
            const isClear = category === 'celeste_clears';
            const badge = isClear ? 
                `<span class="star-badge">${item.star} Star</span>` :
                `<span class="tier-badge">Tier ${item.tier}</span>`;
            
            const campaign = item.campaign ? 
                `<div class="campaign">${item.campaign}</div>` : '';
            
            return `
                <article class="achievement-card">
                    <div class="achievement-header">
                        <div class="challenge-name">${escapeHtml(item.name)}</div>
                        ${badge}
                    </div>
                    <div class="achievement-meta">
                        ${campaign}
                    </div>
                    ${item.video ? `
                        <a href="${escapeHtml(item.video)}" target="_blank" class="video-link">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="5 3 19 12 5 21 5 3"></polygon>
                            </svg>
                            View Video
                        </a>
                    ` : ''}
                </article>
            `;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        loadAchievements();
    </script>
</body>
</html>
