<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Nebula's Achievements</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #0d0d12;
            --bg-secondary: #15151e;
            --bg-tertiary: #1e1e2a;
            --text-primary: #e8e8e8;
            --text-secondary: #a0a0b0;
            --accent: #6b5ce7;
            --accent-hover: #7d6ff0;
            --error: #e74c3c;
            --success: #2ecc71;
            --border: #2a2a3a;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        h1 {
            font-size: 1.5rem;
            font-weight: 400;
        }
        
        .back-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
        }
        
        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .login-container {
            text-align: center;
            padding: 4rem 2rem;
        }
        
        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        button:hover {
            background: var(--accent-hover);
        }
        
        button.secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }
        
        button.secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        
        .admin-panel {
            display: none;
        }
        
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }
        
        .tab {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
        }
        
        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }
        
        .form-section {
            display: none;
        }
        
        .form-section.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        input, select {
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 1rem;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        .form-row.three-col {
            grid-template-columns: 1fr 1fr 1fr;
        }
        
        .message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: none;
        }
        
        .message.error {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            display: block;
        }
        
        .message.success {
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
            display: block;
        }
        
        .entries-list {
            margin-top: 2rem;
        }
        
        .entry-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .entry-info {
            flex: 1;
        }
        
        .entry-name {
            font-weight: 500;
            margin-bottom: 0.25rem;
        }
        
        .entry-meta {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        
        .entry-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .btn-small {
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
        }
        
        .btn-danger {
            background: var(--error);
        }
        
        .category-select {
            margin-bottom: 2rem;
        }
        
        .help-text {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Admin Panel</h1>
        <a href="/" class="back-link">Back to Site</a>
    </header>
    
    <main>
        <div id="login-view" class="login-container">
            <p>You must be logged in to manage achievements.</p>
            <button onclick="netlifyIdentity.open('login')">Login</button>
        </div>
        
        <div id="admin-view" class="admin-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <span id="user-email" style="color: var(--text-secondary);"></span>
                <button class="secondary" onclick="netlifyIdentity.logout()">Logout</button>
            </div>
            
            <div id="message" class="message"></div>
            
            <div class="tabs">
                <button class="tab active" onclick="switchTab('add')">Add New</button>
                <button class="tab" onclick="switchTab('manage')">Manage Entries</button>
            </div>
            
            <div id="add-tab" class="form-section active">
                <div class="form-group category-select">
                    <label>Category *</label>
                    <select id="category" onchange="updateFormFields()" required>
                        <option value="">Select category...</option>
                        <option value="celeste_goldens">Celeste Goldens</option>
                        <option value="celeste_clears">Celeste Clears</option>
                        <option value="demons">Demons</option>
                        <option value="gd_platformer">Platformer Levels (GD)</option>
                    </select>
                </div>
                
                <form id="achievement-form" onsubmit="saveAchievement(event)">
                    <div class="form-group">
                        <label>Challenge Name *</label>
                        <input type="text" id="name" required placeholder="e.g. Starfruit Supernova">
                    </div>
                    
                    <div class="form-row" id="difficulty-row" style="display: none;">
                        <div class="form-group" id="tier-group" style="display: none;">
                            <label>Tier (1-22) *</label>
                            <input type="number" id="tier" min="1" max="22" placeholder="1">
                        </div>
                        <div class="form-group" id="star-group" style="display: none;">
                            <label>Star Rating (1-9) *</label>
                            <input type="number" id="star" min="1" max="9" placeholder="1">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Campaign / Pack</label>
                        <input type="text" id="campaign" placeholder="e.g. Strawberry Jam, Beginner Lobby">
                    </div>
                    
                    <div class="form-group">
                        <label>Thumbnail URL</label>
                        <input type="url" id="thumbnail" placeholder="https://i.imgur.com/...">
                        <div class="help-text">Direct image link (Imgur, etc.)</div>
                    </div>
                    
                    <div class="form-group">
                        <label>Video URL</label>
                        <input type="url" id="video" placeholder="https://youtube.com/... or https://bilibili.com/...">
                    </div>
                    
                    <!-- Celeste-specific fields -->
                    <div id="celeste-fields" style="display: none;">
                        <div class="form-row">
<div class="form-group" id="time-group">
    <label>Time</label>
    <input type="text" id="time" placeholder="e.g. 1:23:45" pattern="[0-9]+:[0-5][0-9]:[0-5][0-9]">
    <div class="help-text">hh:mm:ss</div>
</div>
                            <div class="form-group" id="deaths-group" style="display: none;">
                                <label>Deaths</label>
                                <input type="number" id="deaths" min="0" placeholder="0">
                            </div>
                        </div>
                    </div>
                    
                    <!-- GD-specific fields -->
                    <div id="gd-fields" style="display: none;">
                        <div class="form-group">
                            <label>Attempts</label>
                            <input type="number" id="attempts" min="1" placeholder="e.g. 1500">
                        </div>
                    </div>
                    
                    <button type="submit">Save Achievement</button>
                </form>
            </div>
            
            <div id="manage-tab" class="form-section">
                <div class="form-group">
                    <label>Filter by Category</label>
                    <select id="filter-category" onchange="loadEntries()">
                        <option value="all">All Categories</option>
                        <option value="celeste_goldens">Celeste Goldens</option>
                        <option value="celeste_clears">Celeste Clears</option>
                        <option value="demons">Demons</option>
                        <option value="gd_platformer">Platformer Levels (GD)</option>
                    </select>
                </div>
                <div id="entries-list" class="entries-list"></div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = '/api/achievements';
        let currentUser = null;
        let allEntries = {};
        
        netlifyIdentity.on('init', user => {
            if (user) {
                currentUser = user;
                showAdminPanel();
            }
        });
        
        netlifyIdentity.on('login', user => {
            currentUser = user;
            showAdminPanel();
            netlifyIdentity.close();
        });
        
        netlifyIdentity.on('logout', () => {
            currentUser = null;
            showLoginView();
        });
        
        function showAdminPanel() {
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('admin-view').style.display = 'block';
            document.getElementById('user-email').textContent = currentUser.email;
            loadEntries();
        }
        
        function showLoginView() {
            document.getElementById('login-view').style.display = 'block';
            document.getElementById('admin-view').style.display = 'none';
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');
            
            if (tab === 'manage') loadEntries();
        }
        
        function updateFormFields() {
            const category = document.getElementById('category').value;
            const tierGroup = document.getElementById('tier-group');
            const starGroup = document.getElementById('star-group');
            const difficultyRow = document.getElementById('difficulty-row');
            const celesteFields = document.getElementById('celeste-fields');
            const gdFields = document.getElementById('gd-fields');
            const deathsGroup = document.getElementById('deaths-group');
            const timeGroup = document.getElementById('time-group');
            
            // Reset
            tierGroup.style.display = 'none';
            starGroup.style.display = 'none';
            celesteFields.style.display = 'none';
            gdFields.style.display = 'none';
            deathsGroup.style.display = 'none';
            document.getElementById('tier').required = false;
            document.getElementById('star').required = false;
            
            if (!category) {
                difficultyRow.style.display = 'none';
                return;
            }
            
            difficultyRow.style.display = 'grid';
            
            if (category === 'celeste_clears') {
                starGroup.style.display = 'block';
                document.getElementById('star').required = true;
                celesteFields.style.display = 'block';
                deathsGroup.style.display = 'block';
            } else if (category === 'celeste_goldens') {
                tierGroup.style.display = 'block';
                document.getElementById('tier').required = true;
                celesteFields.style.display = 'block';
                timeGroup.style.display = 'block';
            } else {
                // GD categories
                tierGroup.style.display = 'block';
                document.getElementById('tier').required = true;
                gdFields.style.display = 'block';
            }
        }
        
        async function saveAchievement(e) {
            e.preventDefault();
            
            const category = document.getElementById('category').value;
            if (!category) {
                showMessage('Please select a category', 'error');
                return;
            }
            
            const data = {
                category,
                name: document.getElementById('name').value,
                campaign: document.getElementById('campaign').value || null,
                thumbnail: document.getElementById('thumbnail').value || null,
                video: document.getElementById('video').value || null
            };
            
            if (category === 'celeste_clears') {
                data.star = parseInt(document.getElementById('star').value);
                data.deaths = document.getElementById('deaths').value ? parseInt(document.getElementById('deaths').value) : null;
                data.time = document.getElementById('time').value || null;
            } else if (category === 'celeste_goldens') {
                data.tier = parseInt(document.getElementById('tier').value);
                data.time = document.getElementById('time').value || null;
            } else {
                // GD
                data.tier = parseInt(document.getElementById('tier').value);
                data.attempts = document.getElementById('attempts').value ? parseInt(document.getElementById('attempts').value) : null;
            }
            
            try {
                const token = await currentUser.jwt();
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    showMessage('Achievement saved successfully', 'success');
                    document.getElementById('achievement-form').reset();
                    updateFormFields();
                    loadEntries();
                } else {
                    const err = await response.text();
                    showMessage('Error: ' + err, 'error');
                }
            } catch (error) {
                showMessage('Error saving: ' + error.message, 'error');
            }
        }
        
        async function loadEntries() {
            try {
                const response = await fetch(API_URL);
                allEntries = await response.json();
                renderEntries();
            } catch (error) {
                showMessage('Error loading entries', 'error');
            }
        }
        
        function renderEntries() {
            const filter = document.getElementById('filter-category').value;
            const container = document.getElementById('entries-list');
            
            let html = '';
            const categories = filter === 'all' ? 
                ['celeste_goldens', 'celeste_clears', 'demons', 'gd_platformer'] : 
                [filter];
            
            categories.forEach(cat => {
                const items = allEntries[cat] || [];
                if (items.length === 0) return;
                
                html += `<h3 style="margin: 1.5rem 0 1rem; color: var(--text-secondary); font-weight: 400;">${getCategoryName(cat)}</h3>`;
                items.forEach((item, index) => {
                    const meta = item.tier !== undefined ? `Tier ${item.tier}` : `${item.star} Star`;
                    const extra = item.time ? ` • ${item.time}` : item.deaths !== null ? ` • ${item.deaths} deaths` : item.attempts ? ` • ${item.attempts} attempts` : '';
                    html += `
                        <div class="entry-item">
                            <div class="entry-info">
                                <div class="entry-name">${escapeHtml(item.name)}</div>
                                <div class="entry-meta">${meta}${item.campaign ? ' · ' + escapeHtml(item.campaign) : ''}${extra}</div>
                            </div>
                            <div class="entry-actions">
                                <button class="secondary btn-small" onclick="deleteEntry('${cat}', ${index})">Delete</button>
                            </div>
                        </div>
                    `;
                });
            });
            
            container.innerHTML = html || '<p style="color: var(--text-secondary);">No entries found</p>';
        }
        
        function getCategoryName(key) {
            const names = {
                'celeste_goldens': 'Celeste Goldens',
                'celeste_clears': 'Celeste Clears',
                'demons': 'Demons',
                'gd_platformer': 'Platformer Levels (GD)'
            };
            return names[key] || key;
        }
        
        async function deleteEntry(category, index) {
            if (!confirm('Are you sure you want to delete this entry?')) return;
            
            try {
                const token = await currentUser.jwt();
                
                const response = await fetch(`${API_URL}?category=${category}&index=${index}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });
                
                if (response.ok) {
                    loadEntries();
                } else {
                    showMessage('Error deleting entry', 'error');
                }
            } catch (error) {
                showMessage('Error deleting: ' + error.message, 'error');
            }
        }
        
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
            setTimeout(() => msg.className = 'message', 3000);
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
