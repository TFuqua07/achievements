<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Nebula's Achievements</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --bg-card: #1e1e2e;
            --text-primary: #f0f0f5;
            --text-secondary: #9090a0;
            --text-muted: #606070;
            --border: #2a2a3a;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --error: #ef4444;
            --success: #22c55e;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
        }
        
        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }
        
        .back-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
        }
        
        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .login-container {
            text-align: center;
            padding: 4rem 2rem;
        }
        
        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.625rem 1.25rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
            font-family: inherit;
        }
        
        button:hover {
            background: var(--accent-hover);
        }
        
        button.secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }
        
        button.secondary:hover {
            border-color: var(--text-secondary);
            color: var(--text-primary);
        }
        
        .admin-panel {
            display: none;
        }
        
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }
        
        .tab {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 0.75rem 1.25rem;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            font-family: inherit;
        }
        
        .tab:hover {
            color: var(--text-primary);
        }
        
        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }
        
        .form-section {
            display: none;
        }
        
        .form-section.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 1.25rem;
        }
        
        label {
            display: block;
            margin-bottom: 0.375rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
        }
        
        input, select {
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.625rem 0.875rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-family: inherit;
            transition: border-color 0.15s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        .message {
            padding: 0.875rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.25rem;
            font-size: 0.875rem;
            display: none;
        }
        
        .message.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--error);
            display: block;
        }
        
        .message.success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            color: var(--success);
            display: block;
        }
        
        .entries-list {
            margin-top: 1.5rem;
        }
        
        .entry-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 0.625rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .entry-info {
            flex: 1;
        }
        
        .entry-name {
            font-weight: 500;
            font-size: 0.9375rem;
            margin-bottom: 0.25rem;
        }
        
        .entry-meta {
            font-size: 0.8125rem;
            color: var(--text-secondary);
        }
        
        .entry-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .btn-small {
            padding: 0.375rem 0.75rem;
            font-size: 0.8125rem;
        }
        
        .category-select {
            margin-bottom: 1.5rem;
        }
        
        .help-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.375rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Admin Panel</h1>
        <a href="/" class="back-link">Back to Site</a>
    </header>
    
    <main>
        <div id="login-view" class="login-container">
            <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">You must be logged in to manage achievements.</p>
            <button onclick="netlifyIdentity.open('login')">Login</button>
        </div>
        
        <div id="admin-view" class="admin-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <span id="user-email" style="color: var(--text-secondary); font-size: 0.875rem;"></span>
                <button class="secondary" onclick="netlifyIdentity.logout()">Logout</button>
            </div>
            
            <div id="message" class="message"></div>
            
            <div class="tabs">
                <button class="tab active" onclick="switchTab('add')">Add New</button>
                <button class="tab" onclick="switchTab('manage')">Manage Entries</button>
            </div>
            
            <div id="add-tab" class="form-section active">
                <div class="form-group category-select">
                    <label>Category *</label>
                    <select id="category" onchange="updateFormFields()" required>
                        <option value="">Select category...</option>
                        <option value="celeste_goldens">Celeste Goldens</option>
                        <option value="celeste_clears">Celeste Clears</option>
                        <option value="demons">Demons</option>
                        <option value="gd_platformer">Platformer Levels (GD)</option>
                    </select>
                </div>
                
                <form id="achievement-form" onsubmit="saveAchievement(event)">
                    <div class="form-group">
                        <label>Challenge Name *</label>
                        <input type="text" id="name" required placeholder="e.g. Starfruit Supernova">
                    </div>
                    
                    <div class="form-group" id="difficulty-row" style="display: none;">
                        <label id="difficulty-label">Difficulty *</label>
                        <select id="difficulty" required>
                            <!-- Populated by JS -->
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Campaign <span style="color: var(--text-muted); font-weight: 400;">(Optional)</span></label>
                        <input type="text" id="campaign" placeholder="e.g. Strawberry Jam">
                    </div>
                    
                    <div class="form-group">
                        <label>Video URL</label>
                        <input type="url" id="video" placeholder="https://youtube.com/watch?v=..." onchange="previewThumbnail()">
                        <div class="help-text">Thumbnail will be auto-extracted from YouTube video</div>
                    </div>
                    
                    <div class="form-group" id="thumbnail-preview" style="display: none;">
                        <label>Thumbnail Preview</label>
                        <img id="thumb-img" style="max-width: 320px; border-radius: 8px; border: 1px solid var(--border);" src="">
                    </div>
                    
                    <!-- Celeste-specific fields -->
                    <div id="celeste-fields" style="display: none;">
                        <div class="form-row">
                            <div class="form-group" id="time-group">
                                <label>Time <span style="color: var(--text-muted); font-weight: 400;">(Optional)</span></label>
                                <input type="text" id="time" placeholder="h:mm:ss" pattern="[0-9]+:[0-5][0-9]:[0-5][0-9]">
                                <div class="help-text">Format: h:mm:ss or hh:mm:ss</div>
                            </div>
                            <div class="form-group" id="deaths-group" style="display: none;">
                                <label>Deaths <span style="color: var(--text-muted); font-weight: 400;">(Optional)</span></label>
                                <input type="number" id="deaths" min="0" placeholder="0">
                            </div>
                        </div>
                    </div>
                    
                    <!-- GD-specific fields -->
                    <div id="gd-fields" style="display: none;">
                        <div class="form-group">
                            <label>Attempts <span style="color: var(--text-muted); font-weight: 400;">(Optional)</span></label>
                            <input type="number" id="attempts" min="1" placeholder="e.g. 1500">
                        </div>
                    </div>
                    
                    <button type="submit">Save Achievement</button>
                </form>
            </div>
            
            <div id="manage-tab" class="form-section">
                <div class="form-group">
                    <label>Filter by Category</label>
                    <select id="filter-category" onchange="loadEntries()">
                        <option value="all">All Categories</option>
                        <option value="celeste_goldens">Celeste Goldens</option>
                        <option value="celeste_clears">Celeste Clears</option>
                        <option value="demons">Demons</option>
                        <option value="gd_platformer">Platformer Levels (GD)</option>
                    </select>
                </div>
                <div id="entries-list" class="entries-list"></div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = '/api/achievements';
        let currentUser = null;
        let allEntries = {};
        
        // GD Tier names from screenshots
        const tierNames = {
            1: 'Beginner', 2: 'Easy', 3: 'Medium', 4: 'Hard', 5: 'Very Hard',
            6: 'Insane', 7: 'Extreme', 8: 'Remorseless', 9: 'Relentless',
            10: 'Terrifying', 11: 'Catastrophic', 12: 'Merciless',
            13: 'Excruciating', 14: 'Monstrous', 15: 'Apocalyptic',
            16: 'Demonic', 17: 'Menacing', 18: 'Unreal', 19: 'Nightmare',
            20: 'Extreme Demon', 21: 'Easy Demon', 22: 'Medium Demon'
        };
        
        netlifyIdentity.on('init', user => {
            if (user) {
                currentUser = user;
                showAdminPanel();
            }
        });
        
        netlifyIdentity.on('login', user => {
            currentUser = user;
            showAdminPanel();
            netlifyIdentity.close();
        });
        
        netlifyIdentity.on('logout', () => {
            currentUser = null;
            showLoginView();
        });
        
        function showAdminPanel() {
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('admin-view').style.display = 'block';
            document.getElementById('user-email').textContent = currentUser.email;
            loadEntries();
        }
        
        function showLoginView() {
            document.getElementById('login-view').style.display = 'block';
            document.getElementById('admin-view').style.display = 'none';
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');
            
            if (tab === 'manage') loadEntries();
        }
        
        function updateFormFields() {
            const category = document.getElementById('category').value;
            const difficultyRow = document.getElementById('difficulty-row');
            const difficultySelect = document.getElementById('difficulty');
            const difficultyLabel = document.getElementById('difficulty-label');
            const celesteFields = document.getElementById('celeste-fields');
            const gdFields = document.getElementById('gd-fields');
            const deathsGroup = document.getElementById('deaths-group');
            
            // Reset
            celesteFields.style.display = 'none';
            gdFields.style.display = 'none';
            deathsGroup.style.display = 'none';
            difficultyRow.style.display = 'none';
            difficultySelect.innerHTML = '';
            difficultySelect.required = false;
            
            if (!category) return;
            
            difficultyRow.style.display = 'block';
            difficultySelect.required = true;
            
            if (category === 'celeste_clears') {
                difficultyLabel.textContent = 'Star Rating *';
                // Stars 1-9
                for (let i = 9; i >= 1; i--) {
                    const opt = document.createElement('option');
                    opt.value = i;
                    opt.textContent = `${i} Star`;
                    difficultySelect.appendChild(opt);
                }
                celesteFields.style.display = 'block';
                deathsGroup.style.display = 'block';
            } else {
                // GD Tiers or Goldens Tiers
                difficultyLabel.textContent = 'Tier *';
                const maxTier = category === 'celeste_goldens' ? 22 : 22;
                for (let i = maxTier; i >= 1; i--) {
                    const opt = document.createElement('option');
                    opt.value = i;
                    opt.textContent = tierNames[i] || `Tier ${i}`;
                    difficultySelect.appendChild(opt);
                }
                
                if (category === 'celeste_goldens') {
                    celesteFields.style.display = 'block';
                } else {
                    gdFields.style.display = 'block';
                }
            }
        }
        
        function previewThumbnail() {
            const videoUrl = document.getElementById('video').value;
            const previewDiv = document.getElementById('thumbnail-preview');
            const img = document.getElementById('thumb-img');
            
            const match = videoUrl.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)/);
            if (match) {
                img.src = `https://img.youtube.com/vi/${match[1]}/hqdefault.jpg`;
                previewDiv.style.display = 'block';
            } else {
                previewDiv.style.display = 'none';
            }
        }
        
        async function saveAchievement(e) {
            e.preventDefault();
            
            const category = document.getElementById('category').value;
            if (!category) {
                showMessage('Please select a category', 'error');
                return;
            }
            
            const videoUrl = document.getElementById('video').value;
            const difficulty = document.getElementById('difficulty').value;
            
            const data = {
                category,
                name: document.getElementById('name').value,
                campaign: document.getElementById('campaign').value || null,
                video: videoUrl || null
            };
            
            // Auto-extract thumbnail from YouTube
            if (videoUrl) {
                const match = videoUrl.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)/);
                if (match) {
                    data.thumbnail = `https://img.youtube.com/vi/${match[1]}/hqdefault.jpg`;
                }
            }
            
            if (category === 'celeste_clears') {
                data.star = parseInt(difficulty);
                data.deaths = document.getElementById('deaths').value ? parseInt(document.getElementById('deaths').value) : null;
                data.time = document.getElementById('time').value || null;
            } else {
                data.tier = parseInt(difficulty);
                if (category === 'celeste_goldens') {
                    data.time = document.getElementById('time').value || null;
                } else {
                    data.attempts = document.getElementById('attempts').value ? parseInt(document.getElementById('attempts').value) : null;
                }
            }
            
            try {
                const token = await currentUser.jwt();
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    showMessage('Achievement saved successfully', 'success');
                    document.getElementById('achievement-form').reset();
                    document.getElementById('thumbnail-preview').style.display = 'none';
                    updateFormFields();
                    loadEntries();
                } else {
                    const err = await response.text();
                    showMessage('Error: ' + err, 'error');
                }
            } catch (error) {
                showMessage('Error saving: ' + error.message, 'error');
            }
        }
        
        async function loadEntries() {
            try {
                const response = await fetch(API_URL);
                allEntries = await response.json();
                renderEntries();
            } catch (error) {
                showMessage('Error loading entries', 'error');
            }
        }
        
        function renderEntries() {
            const filter = document.getElementById('filter-category').value;
            const container = document.getElementById('entries-list');
            
            let html = '';
            const categories = filter === 'all' ? 
                ['celeste_goldens', 'celeste_clears', 'demons', 'gd_platformer'] : 
                [filter];
            
            categories.forEach(cat => {
                const items = allEntries[cat] || [];
                if (items.length === 0) return;
                
                html += `<h3 style="margin: 1.5rem 0 0.75rem; color: var(--text-secondary); font-size: 0.875rem; font-weight: 600; text-transform: uppercase;">${getCategoryName(cat)}</h3>`;
                items.forEach((item, index) => {
                    const isStar = item.star !== undefined;
                    const num = isStar ? item.star : item.tier;
                    const meta = isStar ? `${num} Star` : (tierNames[num] || `Tier ${num}`);
                    const extra = item.time ? ` • ${item.time}` : item.deaths !== null ? ` • ${item.deaths} deaths` : item.attempts ? ` • ${item.attempts.toLocaleString()} attempts` : '';
                    html += `
                        <div class="entry-item">
                            <div class="entry-info">
                                <div class="entry-name">${escapeHtml(item.name)}</div>
                                <div class="entry-meta">${meta}${item.campaign ? ' · ' + escapeHtml(item.campaign) : ''}${extra}</div>
                            </div>
                            <div class="entry-actions">
                                <button class="secondary btn-small" onclick="deleteEntry('${cat}', ${index})">Delete</button>
                            </div>
                        </div>
                    `;
                });
            });
            
            container.innerHTML = html || '<p style="color: var(--text-secondary); font-size: 0.875rem;">No entries found</p>';
        }
        
        function getCategoryName(key) {
            const names = {
                'celeste_goldens': 'Celeste Goldens',
                'celeste_clears': 'Celeste Clears',
                'demons': 'Demons',
                'gd_platformer': 'Platformer Levels (GD)'
            };
            return names[key] || key;
        }
        
        async function deleteEntry(category, index) {
            if (!confirm('Are you sure you want to delete this entry?')) return;
            
            try {
                const token = await currentUser.jwt();
                
                const response = await fetch(`${API_URL}?category=${category}&index=${index}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });
                
                if (response.ok) {
                    loadEntries();
                } else {
                    showMessage('Error deleting entry', 'error');
                }
            } catch (error) {
                showMessage('Error deleting: ' + error.message, 'error');
            }
        }
        
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
            setTimeout(() => msg.className = 'message', 3000);
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
